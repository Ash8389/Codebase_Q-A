spring.application.name=ingest_service

server.port=8081

qdrant.port=${QDRANT_PORT:6334}
qdrant.host=${QDRANT_HOST:localhost}




spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

spring.kafka.producer.acks=1
spring.kafka.producer.batch-size=65536
spring.kafka.producer.properties.linger.ms=20
spring.kafka.producer.properties.compression.type=lz4


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer