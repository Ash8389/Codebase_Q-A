spring:
  cloud:
    gateway:
      routes:
        - id: query-service
          uri: ${QUERY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        - id: ingest-service
          uri: ${INGEST_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/ingest/**
          filters:
            - StripPrefix=1