services:
  # INFRASTRUCTURE

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [coderag]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [coderag]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9093,CONTROLLER://:9094

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [coderag]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9093 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  # APPLICATION SERVICES
/
  api-gateway:
    #    build:
    #      context: .
    #      dockerfile: api-Gateway/Dockerfile
    image: ash270/coderag-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      # JWT_SECRET: ${JWT_SECRET}
      QUERY_SERVICE_URL: http://query-service:8083
      INGEST_SERVICE_URL: http://ingestion-service:8081
    networks: [coderag]
    restart: on-failure
    # Gateway doesn't need Kafka/Qdrant directly
    # it just routes requests to downstream services

  ingestion-service:
    #    build:
    #      context: .
    #      dockerfile: ingestion-service/Dockerfile
    image: ash270/coderag-ingestion-service:latest
    container_name: ingestion-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      # JWT_SECRET: ${JWT_SECRET}
    #    tmpfs:
    #      - /tmp/coderag:size=512m
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks: [coderag]
    restart: on-failure

  embedding-service:
    #    build:
    #      context: .
    #      dockerfile: embedding-service/Dockerfile
    image: ash270/coderag-embedding-service:latest
    container_name: embedding-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      JINA_API_KEY: ${JINA_API_KEY:-}
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks: [coderag]
    restart: on-failure

  query-service:
    #    build:
    #      context: .
    #      dockerfile: query-service/Dockerfile
    image: ash270/coderag-query-service:latest
    container_name: query-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      SPRING_DATA_REDIS_HOST: rag-redis
      SPRING_DATA_REDIS_PORT: 6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [coderag]
    restart: on-failure

# NETWORKS & VOLUMES

networks:
  coderag:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  kafka_data:
