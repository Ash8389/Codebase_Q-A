spring.application.name=embedding_Service

server.port=8082

qdrant.port=${QDRANT_PORT:6334}
qdrant.host=${QDRANT_HOST:localhost}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

spring.kafka.consumer.group-id=embedding-service

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

jina.api.key=${JINA_API_KEY}
jina.baseurl=https://api.jina.ai/v1
jina.model=jina-embeddings-v5-text-small