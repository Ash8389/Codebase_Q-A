#            retention-days: 1

  docker-build-push:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
#   needs: build-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            dockerfile: api-Gateway/Dockerfile
          - service: ingestion-service
            dockerfile: ingestion-service/Dockerfile
          - service: embedding-service
            dockerfile: embedding-service/Dockerfile
          - service: query-service
            dockerfile: query-service/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

#     - name: Download build artifacts
#       uses: actions/download-artifact@v4
#       with:
#         name: service-jars

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/coderag-${{ matrix.service }}:latest
            ${{ env.DOCKER_HUB_USERNAME }}/coderag-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/coderag-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/coderag-${{ matrix.service }}:buildcache,mode=max